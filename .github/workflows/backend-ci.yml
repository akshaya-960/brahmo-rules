name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn supabase python-dotenv pytest

      - name: Check imports (syntax + import errors)
        run: |
          python -c "import ast; ast.parse(open('main.py').read())"
          python -c "import ast; ast.parse(open('db.py').read())"

      - name: Run tests (if present)
        run: |
          if [ -d "tests" ] && [ "$(ls -A tests 2>/dev/null)" ]; then
            pytest tests/ -v
          else
            echo "No tests found yet - skipping."
          fi
